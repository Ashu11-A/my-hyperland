# Applications
bind = $mainMod, Return, exec, $terminal
bindd = SUPER, B, Open browser, exec, google-chrome
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, D, exec, $menu

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, space, togglefloating,
bind = $mainMod, F, fullscreen, 0

# Focus navigation (Super + Arrows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window (Super + Ctrl + Arrows)
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Switch workspace (Super + [0-9])
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace (Super + Shift + [0-9])
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Resize windows (Super + Alt + Arrows)
binde = $mainMod ALT, right, resizeactive, 30 0
binde = $mainMod ALT, left, resizeactive, -30 0
binde = $mainMod ALT, up, resizeactive, 0 -30
binde = $mainMod ALT, down, resizeactive, 0 30

# Resize submap (Super + R, then arrows, ESC to exit)
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 30 0
binde = , left, resizeactive, -30 0
binde = , up, resizeactive, 0 -30
binde = , down, resizeactive, 0 30
bind = , escape, submap, reset
submap = reset

# Mouse binds (Super + Left/Right click)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys (Volume and Brightness)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Notifications (swaync)
bindd = SUPER, COMMA, Dismiss last notification, exec, swaync-client --close-latest
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, swaync-client --close-all
bindd = SUPER CTRL, COMMA, Open notifications panel, exec, swaync-client --toggle-panel
bindd = SUPER ALT, COMMA, Toggle silencing notifications, exec, swaync-client --toggle-dnd && swaync-client --get-dnd | grep -q 'true' && notify-send "Silenced notifications" || notify-send "Enabled notifications"

# Screenshots
$hyprshot = $HOME/.local/bin/hyprshot
bindd = , PRINT, Region screenshot, exec, $hyprshot -m region --clipboard-only
bindd = ALT, PRINT, Window screenshot, exec, $hyprshot -m window --clipboard-only
bindd = SHIFT, PRINT, Monitor screenshot, exec, $hyprshot -m output --clipboard-only
bindd = SUPER, PRINT, Fullscreen screenshot, exec, $hyprshot -m output --freeze --clipboard-only

